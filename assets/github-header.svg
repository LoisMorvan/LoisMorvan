<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lois Morvan GitHub profile header</title>
  <desc id="desc">Dark portfolio-themed banner with a controlled lime gradient.</desc>
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1200" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111114"/>
      <stop offset="0.36" stop-color="#151a12"/>
      <stop offset="0.72" stop-color="#263915"/>
      <stop offset="1" stop-color="#5f8f1c"/>
    </linearGradient>
    <radialGradient id="lime-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(870 120) rotate(145) scale(520 260)">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0.38"/>
      <stop offset="0.42" stop-color="#65a30d" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#65a30d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="soft-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 150) rotate(28) scale(420 210)">
      <stop offset="0" stop-color="#365314" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#365314" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="330" rx="0" fill="url(#base)"/>
  <rect width="1200" height="330" rx="0" fill="url(#lime-glow)"/>
  <rect width="1200" height="330" rx="0" fill="url(#soft-left)"/>
  <path d="M0 250C186 216 348 232 528 255C709 278 910 303 1200 238V330H0V250Z" fill="#09090b" fill-opacity="0.52"/>
  <path d="M0 268C208 232 386 249 574 272C756 295 936 312 1200 262" stroke="#a3e635" stroke-opacity="0.22" stroke-width="2"/>

  <g filter="url(#shadow)" text-anchor="middle">
    <text x="600" y="146" fill="#f4f4f5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0">
      Lois Morvan
    </text>
    <text x="600" y="196" fill="#f4f4f5" fill-opacity="0.94" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" letter-spacing="0">
      Full-Stack Developer | React / Next.js / Node.js
    </text>
  </g>
</svg>
